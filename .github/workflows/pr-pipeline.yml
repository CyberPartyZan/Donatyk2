jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - run: dotnet build

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - run: dotnet test tests/unit

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - run: dotnet test tests/integration

  lint:
    runs-on: ubuntu-latest
    steps:
      - run: dotnet format --verify-no-changes

  security:
    runs-on: ubuntu-latest
    steps:
      - run: dotnet list package --vulnerable

